<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>Reproductor Multimedia</title>
  </head>
  <body>
    <h1>Mi Biblioteca Multimedia</h1>

    <section>
      <h2>Canción: Sailing Away</h2>
      <audio controls aria-label="Reproductor de audio para la canción Sailing Away">
        <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
      </audio>
    </section>

    <section>
      <h2>Vídeo: El método map</h2>
      <video controls width="600" aria-label="Reproductor de vídeo que explica el método map">
        <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
        <track src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt" kind="subtitles" srclang="en" label="Inglés">
        Tu navegador no soporta el elemento de vídeo.
      </video>
    </section>

    <section>
      <h2>Transcripción</h2>
      <p>En este vídeo, aprenderemos qué es el método <code>map</code> y cómo funciona en JavaScript para transformar elementos en un array.</p>
    </section>
  </body>
</html>
